<mat-toolbar>
  <button matIconButton (click)="drawer.toggle()" class="example-icon" aria-label="Example icon-button with menu icon">
    <mat-icon>menu</mat-icon>
  </button>
  <span>Table Application</span>
  <span class="example-spacer"></span>
  <button
    matIconButton
    class="example-icon favorite-icon"
    aria-label="Example icon-button with heart icon"
  >
    <mat-icon>favorite</mat-icon>
  </button>
  <button matIconButton class="example-icon" aria-label="Example icon-button with share icon">
    <mat-icon>share</mat-icon>
  </button>
</mat-toolbar>

<mat-drawer-container class="example-container" autosize>
  <mat-drawer #drawer class="example-sidenav" opened="true" mode="side">
    <mat-nav-list>
      <mat-list-item>
        <button routerLink="" matButton="text"><mat-icon>store</mat-icon> Product </button>
      </mat-list-item>
      <mat-list-item>
        <button routerLink="order" matButton="text"><mat-icon>list_alt</mat-icon> Order </button>
      </mat-list-item>
    </mat-nav-list>
  </mat-drawer>

  <mat-drawer-content>
    <router-outlet></router-outlet>
  </mat-drawer-content>
</mat-drawer-container>
