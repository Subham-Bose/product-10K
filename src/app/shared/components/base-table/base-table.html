<div class="table-header-actions">
  <button mat-stroked-button (click)="openColumnManager()">
    <mat-icon>view_column</mat-icon> Manage Columns
  </button>
</div>
<div class="grid-host" style="height: calc(100vh - 180px); width: 100%">
  <ag-grid-angular
    style="width: 100%; height: 100%"
    [rowData]="rowData || []"
    [rowSelection]="'multiple'"
    [defaultColDef]="defaultColDef"
    [columnDefs]="columnDefs"
    [theme]="theme"
    (gridReady)="onGridReady($event)"
  >
  </ag-grid-angular>
</div>
